  <text x="380" y="22" fill="#6b7180" text-anchor="middle">anvil — bash</text>

  <text x="20" y="68"  fill="#36c2e0">  ╔══════════════════════════════════╗</text>
  <text x="20" y="88"  fill="#36c2e0">  ║   A N V I L  ·  coding agent     ║</text>
  <text x="20" y="108" fill="#36c2e0">  ╚══════════════════════════════════╝</text>
  <text x="20" y="132" fill="#6b7180">  provider: openai   model: gpt-4o-mini</text>

  <text x="20" y="168" fill="#e6e8f0"><tspan fill="#f2f4f8" font-weight="bold">anvil› </tspan>add a /version command to the CLI</text>

  <text x="20" y="196" fill="#36c2e0">  → list_dir <tspan fill="#6b7180">{"path":"src"}</tspan></text>
  <text x="20" y="216" fill="#36c2e0">  → read_file <tspan fill="#6b7180">{"path":"src/main.cpp"}</tspan></text>
  <text x="20" y="236" fill="#36c2e0">  → write_file <tspan fill="#6b7180">{"path":"src/main.cpp", ...}</tspan></text>
  <text x="20" y="256" fill="#febc2e">  ? Write 5128 bytes to 'src/main.cpp'? [y/N]: <tspan fill="#e6e8f0">y</tspan></text>
  <text x="20" y="276" fill="#36c2e0">  → run_command <tspan fill="#6b7180">{"command":"cmake --build build"}</tspan></text>
  <text x="20" y="296" fill="#febc2e">  ? Run command: cmake --build build ? [y/N]: <tspan fill="#e6e8f0">y</tspan></text>

  <text x="20" y="332" fill="#2dd4a7">  Added a `--version` flag that prints "anvil 1.0.0" and exits.</text>
  <text x="20" y="352" fill="#2dd4a7">  Built cleanly. Try: anvil --version</text>

  <text x="20" y="388" fill="#f2f4f8" font-weight="bold">anvil› <tspan fill="#3a3f4b">▋</tspan></text>

