<svg xmlns="http://www.w3.org/2000/svg" width="860" height="540" viewBox="0 0 860 540" font-family="'Segoe UI',sans-serif" font-size="13">
  <rect width="860" height="540" rx="10" fill="#0f1115"/>
  <!-- titlebar -->
  <rect x="0" y="0" width="860" height="38" fill="#171a21"/>
  <rect x="14" y="11" width="16" height="16" rx="4" fill="#ff6b35"/>
  <text x="38" y="24" fill="#f2f4f8" font-weight="bold">⚒ Anvil</text>
  <rect x="690" y="8" width="86" height="22" rx="6" fill="#1e222b" stroke="#2a2f3a"/>
  <text x="700" y="23" fill="#cdd2dd" font-size="11">Open Folder</text>
  <rect x="784" y="8" width="64" height="22" rx="6" fill="#1e222b" stroke="#2a2f3a"/>
  <text x="794" y="23" fill="#cdd2dd" font-size="11">⚙ Settings</text>

  <!-- sidebar -->
  <rect x="0" y="38" width="200" height="502" fill="#171a21"/>
  <text x="14" y="62" fill="#8b93a4" font-size="11" letter-spacing="1">EXPLORER</text>
  <text x="14" y="88"  fill="#8b93a4">▸ src</text>
  <text x="26" y="110" fill="#cdd2dd">main.cpp</text>
  <text x="26" y="130" fill="#cdd2dd">ui_html.h</text>
  <text x="14" y="152" fill="#cdd2dd">CMakeLists.txt</text>
  <text x="14" y="172" fill="#cdd2dd">README.md</text>

  <!-- editor -->
  <rect x="200" y="38" width="380" height="34" fill="#171a21"/>
  <text x="214" y="60" fill="#8b93a4" font-size="12">src/main.cpp</text>
  <rect x="520" y="44" width="50" height="22" rx="6" fill="#ff6b35"/>
  <text x="532" y="59" fill="#1a0e06" font-size="11" font-weight="bold">Save</text>
  <rect x="200" y="72" width="380" height="468" fill="#0c0e12"/>
  <g font-family="'Cascadia Code',Consolas,monospace" font-size="12" fill="#9aa0b3">
    <text x="214" y="96"  fill="#7c9cff">int</text><text x="238" y="96" fill="#e6e8f0"> WINAPI WinMain(...) {</text>
    <text x="230" y="116" fill="#e6e8f0">CoInitializeEx(nullptr, ...);</text>
    <text x="230" y="136" fill="#e6e8f0">createWindow();</text>
    <text x="230" y="156" fill="#2dd4a7">initWebView();</text>
    <text x="230" y="176" fill="#6b7180">// agent bridge ready</text>
    <text x="214" y="196" fill="#e6e8f0">}</text>
  </g>

  <!-- chat -->
  <rect x="580" y="38" width="280" height="502" fill="#171a21"/>
  <text x="594" y="62" fill="#8b93a4" font-size="11" letter-spacing="1">AI AGENT</text>
  <rect x="640" y="80" width="206" height="40" rx="8" fill="#1e222b"/>
  <text x="652" y="104" fill="#e6e8f0" font-size="12">add a /version flag</text>
  <rect x="594" y="132" width="252" height="56" rx="8" fill="#12161d" stroke="#2a2f3a"/>
  <text x="606" y="152" fill="#e6e8f0" font-size="12">Reading main.cpp and adding</text>
  <text x="606" y="170" fill="#e6e8f0" font-size="12">a --version handler…</text>
  <text x="600" y="208" fill="#8b93a4" font-family="monospace" font-size="11">→ read_file {"path":"src/main.cpp"}</text>
  <text x="600" y="228" fill="#8b93a4" font-family="monospace" font-size="11">→ write_file {"path":"src/main.cpp"}</text>
  <rect x="594" y="244" width="252" height="48" rx="8" fill="#12161d" stroke="#2a2f3a"/>
  <text x="606" y="264" fill="#2dd4a7" font-size="12">Done. Added a --version flag</text>
  <text x="606" y="282" fill="#2dd4a7" font-size="12">that prints anvil 1.0.0.</text>
  <rect x="594" y="486" width="252" height="40" rx="8" fill="#1e222b" stroke="#2a2f3a"/>
  <text x="606" y="510" fill="#8b93a4" font-size="12">Ask Anvil…</text>

  <text x="846" y="532" fill="#3a3f4b" text-anchor="end" font-size="11">UI preview</text>
</svg>
